
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes lineGrow {
  from { width: 0; }
  to { width: 48px; }
}
@keyframes dotPulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.4); opacity: 1; }
}
.fade1 { animation: fadeUp 0.6s ease both; }
.fade2 { animation: fadeUp 0.6s 0.15s ease both; }
.fade3 { animation: fadeUp 0.6s 0.3s ease both; }
.fade4 { animation: fadeUp 0.6s 0.45s ease both; }
.fade5 { animation: fadeUp 0.6s 0.6s ease both; }
</style>

<div style="font-family: 'DM Sans', sans-serif; max-width: 580px; margin: 0 auto;">

  <div style="
    position: relative;
    background: #0f0f1a;
    border-radius: 16px;
    overflow: hidden;
    aspect-ratio: 1.91 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  ">

    <!-- Arrière-plan décoratif -->
    <div style="position: absolute; inset: 0; overflow: hidden;">
      <!-- Glow principal violet -->
      <div style="position: absolute; top: -100px; right: -80px; width: 380px; height: 380px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 65%);"></div>
      <!-- Glow accent amber -->
      <div style="position: absolute; bottom: -60px; left: -40px; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 65%);"></div>
      <!-- Glow violet secondaire -->
      <div style="position: absolute; top: 40%; left: 30%; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.08) 0%, transparent 70%);"></div>
      <!-- Grille -->
      <svg style="position:absolute;inset:0;width:100%;height:100%;opacity:0.05" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse">
            <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#6366f1" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid2)"/>
      </svg>
      <!-- Ligne diagonale déco -->
      <div style="position: absolute; top: 0; right: 120px; width: 1px; height: 100%; background: linear-gradient(to bottom, transparent, rgba(99,102,241,0.2), transparent);"></div>
    </div>

    <div style="position: relative; z-index: 1; width: 100%;">

      <!-- Header logo + badge -->
      <div class="fade1" style="display: flex; align-items: center; gap: 10px; margin-bottom: 28px;">
        <div style="width: 34px; height: 34px; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="white"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="white"/>
          </svg>
        </div>
        <span style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; color: #e2e8f0; letter-spacing: 0.02em;">MadaDev</span>
        <span style="margin-left: auto; font-size: 11px; color: #818cf8; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid rgba(99,102,241,0.35); padding: 3px 10px; border-radius: 20px;">Nantes</span>
      </div>

      <!-- Disponible -->
      <div class="fade2" style="margin-bottom: 14px;">
        <div style="display: inline-flex; align-items: center; gap: 8px;">
          <div style="width: 6px; height: 6px; border-radius: 50%; background: #f59e0b; animation: dotPulse 2s infinite;"></div>
          <span style="font-size: 11px; color: rgba(226,232,240,0.4); letter-spacing: 0.1em; text-transform: uppercase;">Disponible</span>
        </div>
      </div>

      <!-- Titre -->
      <div class="fade3">
        <p style="font-family: 'Syne', sans-serif; font-weight: 700; font-size: 30px; line-height: 1.15; color: #e2e8f0; margin: 0;">
          Sites vitrine.<br>
          <span style="background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Apps & plateformes.</span>
        </p>
      </div>

      <!-- Sous-titre -->
      <div class="fade4" style="margin-top: 14px;">
        <p style="font-size: 13px; color: #94a3b8; margin: 0; line-height: 1.65; max-width: 340px;">
          Du projet simple au produit ambitieux — je construis des solutions web qui ont quelque chose de solide derrière.
        </p>
      </div>

      <!-- URL -->
      <div class="fade5" style="margin-top: 24px; display: flex; align-items: center; gap: 12px;">
        <div style="width: 48px; height: 1px; background: linear-gradient(to right, #6366f1, #f59e0b);"></div>
        <span style="font-size: 12px; color: rgba(226,232,240,0.3); letter-spacing: 0.05em;">mada-dev.com</span>
      </div>

    </div>
  </div>

  <div style="margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end;">
    <button onclick="sendPrompt('Propose une variante du visuel MadaDev avec la mise en avant de l\\'accent amber #f59e0b plutôt que le violet')" style="font-size: 12px; padding: 5px 12px; cursor: pointer;">Variante amber ↗</button>
    <button onclick="sendPrompt('On peut passer au calendrier éditorial LinkedIn MadaDev maintenant ?')" style="font-size: 12px; padding: 5px 12px; cursor: pointer;">Passer au calendrier ↗</button>
  </div>

</div>
